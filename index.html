<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="./img/ok.svg">
</head>
<body>

    <div class="todo">
        <h1 class="todo-title"><span>ToDo</span> - Твой список задач</h1>
        <h2 class="slogan">Планируй. Твори. Живи</h2>
        <form class="form">
            <input type="text" placeholder="Новая задача" required class="input"> 
            <button class="addBtn">Добавить</button>
        </form>
        <p class="message">
            <span class="message-text">Задач нет. Отдыхай!</span>
            <span class="taskNum"></span>
        </p> 
    </div>

    <div class="categories">
        <button class="category-btn category-all category-btn_active">
            <h3 class="category-title">Все</h3>
        </button>
        
        <button class="category-btn category-active">
            <h3 class="category-title">Активные</h3>
        </button>
        
        <button class="category-btn category-completed">
            <h3 class="category-title">Выполненные</h3>
        </button>
    </div>

    <div class="task-box"></div>

    <script src="./script.js"></script>
</body>
</html>
